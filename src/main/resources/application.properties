# Spring Boot Configuration
spring.application.name=daily-report

# Server Configuration
server.port=8080
server.servlet.context-path=/

# H2 Database Configuration (File-based, embedded)
spring.datasource.url=jdbc:h2:file:./user-data/daily_reports;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging, disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=INFO
logging.level.com.dailyreport=DEBUG
logging.file.name=logs/application.log

# Ollama Configuration
ollama.api.url=http://localhost:11434
ollama.api.model=llama2

# Application Data Path
app.data-path=user-data
app.db-type=h2

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
